<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Giấy Dò Lô Tô</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS riêng cho trang Giấy Dò - THU NHỎ */
        .giaydo-container {
            width: 375px;
            height: 667px;
            position: relative;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .giaydo-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .giaydo-ticket-container {
            width: 100%;
            height: 580px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="page active">
        <div class="giaydo-container">
            <button id="btn-close-tab" class="btn btn-back">✕ Đóng Tab</button>
            
            <div class="giaydo-title">Giấy Dò Lô Tô</div>
            
            <div id="ticket-container" class="giaydo-ticket-container"></div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('cut', (e) => e.preventDefault());
        
        const COLORS = ['#28a745', '#c41e3a', '#ffc107', '#007bff', '#6f42c1'];
        
        function getColumnIndex(num) {
            if (num >= 1 && num <= 9) return 0;
            if (num >= 10 && num <= 19) return 1;
            if (num >= 20 && num <= 29) return 2;
            if (num >= 30 && num <= 39) return 3;
            if (num >= 40 && num <= 49) return 4;
            if (num >= 50 && num <= 59) return 5;
            if (num >= 60 && num <= 69) return 6;
            if (num >= 70 && num <= 79) return 7;
            if (num >= 80 && num <= 90) return 8;
            return 0;
        }
        
        function generateTicket() {
            const container = document.getElementById('ticket-container');
            container.innerHTML = '';
            
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            
            // 1. Phân loại 90 số vào 9 cột tương ứng
            let columns = Array.from({length: 9}, () => []);
            for (let i = 1; i <= 90; i++) {
                columns[getColumnIndex(i)].push(i);
            }
            
            // Xáo trộn các số bên trong từng cột
            columns.forEach(col => {
                for (let i = col.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [col[i], col[j]] = [col[j], col[i]];
                }
            });
            
            let rowData = [];
            
            // 2. Tiến hành xếp số vào 18 hàng
            for (let row = 0; row < 18; row++) {
                let rowNumbers = [];
                
                // Tạo danh sách các cột kèm theo số lượng số còn lại trong cột đó
                let availableCols = columns.map((col, index) => ({
                    index: index,
                    count: col.length
                })).filter(c => c.count > 0); // Chỉ lấy cột còn số
                
                // Sắp xếp cột giảm dần theo số lượng số còn lại để ưu tiên lấy cột nhiều số trước
                // Nếu số lượng bằng nhau thì xáo trộn ngẫu nhiên để đảm bảo tính tự nhiên của Lô Tô
                availableCols.sort((a, b) => {
                    if (b.count !== a.count) {
                        return b.count - a.count;
                    }
                    return Math.random() - 0.5;
                });
                
                // Lấy ra 5 cột tối ưu nhất cho hàng này
                let selectedCols = availableCols.slice(0, 5);
                
                // Rút số từ 5 cột đã chọn
                selectedCols.forEach(c => {
                    let num = columns[c.index].pop(); // Rút 1 số ra khỏi cột
                    rowNumbers.push({
                        num: num,
                        col: c.index
                    });
                });
                
                // Sắp xếp các số trong hàng tăng dần theo thứ tự cột từ trái qua phải
                rowNumbers.sort((a, b) => a.col - b.col);
                rowData.push(rowNumbers);
            }
            
            // 3. Phần hiển thị HTML (Giữ nguyên logic của bạn)
            for (let frame = 0; frame < 2; frame++) {
                const frameDiv = document.createElement('div');
                frameDiv.className = 'ticket-frame';
                frameDiv.style.backgroundColor = color + '30';
                frameDiv.style.borderColor = '#ffffff';
                
                for (let row = 0; row < 9; row++) {
                    const globalRowIndex = frame * 9 + row;
                    const rowNumbers = rowData[globalRowIndex] || [];
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'ticket-row';
                    
                    const colMap = {};
                    rowNumbers.forEach(item => {
                        colMap[item.col] = item.num;
                    });
                    
                    for (let col = 0; col < 9; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'ticket-cell';
                        
                        if (colMap[col] !== undefined) {
                            cell.textContent = colMap[col];
                            cell.dataset.number = colMap[col];
                            cell.addEventListener('click', function() {
                                this.classList.toggle('marked');
                            });
                        } else {
                            cell.classList.add('empty');
                        }
                        
                        rowDiv.appendChild(cell);
                    }
                    
                    frameDiv.appendChild(rowDiv);
                }
                
                container.appendChild(frameDiv);
            }
        }
        
        document.getElementById('btn-close-tab').addEventListener('click', function() {
            window.close();
        });
        
        generateTicket();
    </script>
</body>
</html>
