<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Giấy Dò Lô Tô</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS riêng cho trang Giấy Dò - THU NHỎ */
        .giaydo-container {
            width: 375px;
            height: 667px;
            position: relative;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .giaydo-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 3px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .giaydo-ticket-container {
            width: 100%;
            height: 580px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            overflow: hidden;
        }

        /* --- CSS BỔ SUNG THEO YÊU CẦU --- */
        /* Định dạng hàng chứa 2 nút trên cùng */
        .header-buttons {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        /* CSS cho bảng thông báo màu xanh ngọc */
        .custom-alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .custom-alert-box {
            background-color: #008080; /* Màu xanh ngọc (Teal) */
            color: #ffffff; /* Chữ trắng */
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 280px;
            font-family: Arial, sans-serif;
        }

        .custom-alert-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .custom-alert-buttons {
            display: flex;
            justify-content: space-around;
        }

        .custom-alert-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-confirm {
            background-color: #ffffff;
            color: #008080;
        }

        .btn-cancel {
            background-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="page active">
        <div class="giaydo-container">
            <div class="header-buttons">
                <button id="btn-close-tab" class="btn btn-back">✕ Đóng Tab</button>
                <button id="btn-change-ticket" class="btn btn-back">🔄 Đổi Giấy Dò</button>
            </div>
            
            <div class="giaydo-title">Giấy Dò Lô Tô</div>
            
            <div id="ticket-container" class="giaydo-ticket-container"></div>
        </div>
    </div>

    <div id="custom-alert" class="custom-alert-overlay" style="display: none;">
        <div class="custom-alert-box">
            <div class="custom-alert-title">Bạn Muốn Thay Giấy Dò Mới À ?</div>
            <div class="custom-alert-buttons">
                <button id="alert-btn-confirm" class="custom-alert-btn btn-confirm">Dĩ Nhiên</button>
                <button id="alert-btn-cancel" class="custom-alert-btn btn-cancel">Hok Nha</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('selectstart', (e) => e.preventDefault());
        document.addEventListener('copy', (e) => e.preventDefault());
        document.addEventListener('cut', (e) => e.preventDefault());
        
        const COLORS = [
            '#28a745', '#c41e3a', '#ffc107', '#007bff', '#6f42c1',
            '#e83e8c', '#fd7e14', '#20c997', '#17a2b8', '#6c757d'
        ];
        
        function getColumnIndex(num) {
            if (num >= 1 && num <= 9) return 0;
            if (num >= 10 && num <= 19) return 1;
            if (num >= 20 && num <= 29) return 2;
            if (num >= 30 && num <= 39) return 3;
            if (num >= 40 && num <= 49) return 4;
            if (num >= 50 && num <= 59) return 5;
            if (num >= 60 && num <= 69) return 6;
            if (num >= 70 && num <= 79) return 7;
            if (num >= 80 && num <= 90) return 8;
            return 0;
        }
        
        function generateTicket() {
            const container = document.getElementById('ticket-container');
            container.innerHTML = '';
            
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            
            // 1. Phân loại 90 số vào 9 cột tương ứng
            let columns = Array.from({length: 9}, () => []);
            for (let i = 1; i <= 90; i++) {
                columns[getColumnIndex(i)].push(i);
            }
            
            // Xáo trộn các số bên trong từng cột
            columns.forEach(col => {
                for (let i = col.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [col[i], col[j]] = [col[j], col[i]];
                }
            });
            
            let rowData = [];
            
            // 2. Tiến hành xếp số vào 18 hàng
            for (let row = 0; row < 18; row++) {
                let rowNumbers = [];
                
                // Tạo danh sách các cột kèm theo số lượng số còn lại trong cột đó
                let availableCols = columns.map((col, index) => ({
                    index: index,
                    count: col.length
                })).filter(c => c.count > 0);
                
                availableCols.sort((a, b) => {
                    if (b.count !== a.count) {
                        return b.count - a.count;
                    }
                    return Math.random() - 0.5;
                });
                
                let selectedCols = availableCols.slice(0, 5);
                
                selectedCols.forEach(c => {
                    let num = columns[c.index].pop();
                    rowNumbers.push({
                        num: num,
                        col: c.index
                    });
                });
                
                rowNumbers.sort((a, b) => a.col - b.col);
                rowData.push(rowNumbers);
            }
            
            // 3. Phần hiển thị HTML
            for (let frame = 0; frame < 2; frame++) {
                const frameDiv = document.createElement('div');
                frameDiv.className = 'ticket-frame';
                frameDiv.style.backgroundColor = color + '30';
                frameDiv.style.borderColor = '#ffffff';
                
                for (let row = 0; row < 9; row++) {
                    const globalRowIndex = frame * 9 + row;
                    const rowNumbers = rowData[globalRowIndex] || [];
                    
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'ticket-row';
                    
                    const colMap = {};
                    rowNumbers.forEach(item => {
                        colMap[item.col] = item.num;
                    });
                    
                    for (let col = 0; col < 9; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'ticket-cell';
                        
                        if (colMap[col] !== undefined) {
                            cell.textContent = colMap[col];
                            cell.dataset.number = colMap[col];
                            cell.addEventListener('click', function() {
                                this.classList.toggle('marked');
                            });
                        } else {
                            cell.classList.add('empty');
                        }
                        
                        rowDiv.appendChild(cell);
                    }
                    
                    frameDiv.appendChild(rowDiv);
                }
                
                container.appendChild(frameDiv);
            }
        }
        
        document.getElementById('btn-close-tab').addEventListener('click', function() {
            window.close();
        });

        /* SỰ KIỆN NÚT ĐỔI GIẤY DÒ VÀ CUSTOM ALERT */
        const customAlert = document.getElementById('custom-alert');

        document.getElementById('btn-change-ticket').addEventListener('click', function() {
            customAlert.style.display = 'flex';
        });

        document.getElementById('alert-btn-confirm').addEventListener('click', function() {
            location.reload();
        });

        document.getElementById('alert-btn-cancel').addEventListener('click', function() {
            customAlert.style.display = 'none';
        });
        
        generateTicket();
    </script>
	
	<script src="kinh.js"></script>
	
</body>
</html>
